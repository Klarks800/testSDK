<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>mySDK</title>
    <style>
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #000; }
      #unity-root { position: fixed; inset: 0; background: #000; }
      #unity-canvas { width: 100%; height: 100%; display: block; background: #000; outline: none; }
      #mysdk-loading { position: absolute; left: 50%; bottom: 9vh; width: min(320px, 72vw); transform: translateX(-50%); font: 14px Arial, sans-serif; color: #fff; text-align: center; pointer-events: none; }
      #mysdk-progress { height: 4px; margin-top: 12px; overflow: hidden; background: rgba(255, 255, 255, 0.2); }
      #mysdk-progress-fill { width: 0%; height: 100%; background: #fff; transition: width 0.15s ease-out; }
      #unity-warning { position: absolute; left: 0; right: 0; top: 0; z-index: 10; font: 13px Arial, sans-serif; text-align: center; }
    </style>
  </head>
  <body>
    <div id="unity-root">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-warning"></div>
      <div id="mysdk-loading">
        <div>Loading</div>
        <div id="mysdk-progress"><div id="mysdk-progress-fill"></div></div>
      </div>
    </div>
    <script>
      window.MySDKWebGLTemplate = { platform: "VK", template: "MySDK_VK" };

      var canvas = document.querySelector("#unity-canvas");
      var loading = document.querySelector("#mysdk-loading");
      var progressFill = document.querySelector("#mysdk-progress-fill");
      var warningBanner = document.querySelector("#unity-warning");
      var vkBridgePromise = null;

      function unityShowBanner(msg, type) {
        var div = document.createElement("div");
        div.textContent = msg;
        div.style.padding = "10px";
        div.style.background = type === "error" ? "#b00020" : "#ffd95a";
        div.style.color = type === "error" ? "#fff" : "#111";
        warningBanner.appendChild(div);
        if (type !== "error") {
          setTimeout(function () { warningBanner.removeChild(div); }, 5000);
        }
      }

      function loadExternalScript(src, id, timeoutMs) {
        var existing = document.querySelector("script[data-mysdk-id='" + id + "']");
        if (existing && existing.getAttribute("data-mysdk-loaded") === "1") {
          return Promise.resolve();
        }

        return new Promise(function (resolve, reject) {
          var script = existing || document.createElement("script");
          var completed = false;
          var timeout = setTimeout(function () {
            if (completed) {
              return;
            }

            completed = true;
            reject(new Error("Script load timeout: " + src));
          }, timeoutMs || 8000);

          script.onload = function () {
            if (completed) {
              return;
            }

            completed = true;
            clearTimeout(timeout);
            script.setAttribute("data-mysdk-loaded", "1");
            resolve();
          };

          script.onerror = function () {
            if (completed) {
              return;
            }

            completed = true;
            clearTimeout(timeout);
            reject(new Error("Could not load script: " + src));
          };

          if (!existing) {
            script.src = src;
            script.async = true;
            script.setAttribute("data-mysdk-id", id);
            document.head.appendChild(script);
          }
        });
      }

      window.MySDKEnsureVkBridge = function () {
        if (window.vkBridge || window.VKBridge || window.bridge) {
          return Promise.resolve(window.vkBridge || window.VKBridge || window.bridge);
        }

        if (vkBridgePromise) {
          return vkBridgePromise;
        }

        vkBridgePromise = loadExternalScript("https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js", "vk-bridge", 8000)
          .then(function () {
            var bridge = window.vkBridge || window.VKBridge || window.bridge;
            if (!bridge || !bridge.send) {
              throw new Error("VK Bridge is not available after script load.");
            }

            return bridge.send("VKWebAppInit")
              .catch(function () {
                return {};
              })
              .then(function () {
                return bridge;
              });
          })
          .catch(function (error) {
            console.warn("MySDK VK Bridge init failed:", error);
            throw error;
          });

        return vkBridgePromise;
      };

      window.MySDKEnsureVkBridge().catch(function () {});

      window.addEventListener("contextmenu", function (event) { event.preventDefault(); });
      document.addEventListener("touchmove", function (event) { event.preventDefault(); }, { passive: false });

      var buildUrl = "Build";
      var buildCacheBust = "VK-1777301057";
      if (buildCacheBust.indexOf("__MYSDK_") === 0) {
        buildCacheBust = String(Date.now());
      }

      function buildFile(fileName) {
        return buildUrl + "/" + fileName + "?v=" + encodeURIComponent(buildCacheBust);
      }

      if (typeof WebAssembly !== "undefined" && typeof WebAssembly.instantiateStreaming === "function") {
        WebAssembly.instantiateStreaming = undefined;
      }

      var loaderUrl = buildFile("VKOK.loader.js");
      var config = {
        dataUrl: buildFile("VKOK.data"),
        frameworkUrl: buildFile("VKOK.framework.js"),
        codeUrl: buildFile("VKOK.wasm"),
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "mySDK",
        productVersion: "1.0",
        showBanner: unityShowBanner
      };

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = function () {
        createUnityInstance(canvas, config, function (progress) {
          progressFill.style.width = (100 * progress) + "%";
        }).then(function (unityInstance) {
          window.unityInstance = unityInstance;
          loading.style.display = "none";
        }).catch(function (message) {
          unityShowBanner(message, "error");
        });
      };
      script.onerror = function () {
        unityShowBanner("Could not load Unity loader: " + loaderUrl, "error");
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
